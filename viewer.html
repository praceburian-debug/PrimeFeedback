<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Image Annotator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1c1c1e;
      color: #e0e0e8;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 44px;
      background: #111113;
      border-bottom: 1px solid #2a2a2e;
      flex-shrink: 0;
      position: relative;
    }
    #topbar-left, #topbar-right { display: flex; align-items: center; gap: 6px; z-index: 1; }
    #topbar-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 13px; font-weight: 500; color: #b0b0c0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 280px; pointer-events: none;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 5px 12px;
      background: #18181a;
      border-bottom: 1px solid #2a2a2e;
      flex-shrink: 0;
    }
    .tool-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border: none; border-radius: 6px;
      background: transparent; color: #707080;
      cursor: pointer; transition: all .12s;
      position: relative;
    }
    .tool-btn:hover { background: #26262a; color: #d0d0e0; }
    .tool-btn.active { background: #26262a; color: #fff; }
    .tool-btn.active::after {
      content: '';
      position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
      width: 14px; height: 2px; border-radius: 1px;
      background: #7b68ee;
    }
    .sep { width: 1px; height: 18px; background: #2a2a2e; margin: 0 5px; }
    #color-pick {
      width: 22px; height: 22px;
      border: 2px solid #3a3a40; border-radius: 50%;
      cursor: pointer; padding: 0; background: none;
      transition: border-color .12s;
    }
    #color-pick:hover { border-color: #7b68ee; }
    #stroke-size { width: 60px; accent-color: #7b68ee; cursor: pointer; }
    #stroke-label { font-size: 11px; color: #505060; min-width: 16px; }
    .tb-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 12px; font-weight: 500;
      transition: all .12s; white-space: nowrap;
    }
    .tb-btn:hover { opacity: .85; }
    .btn-save  { background: #7b68ee; color: #fff; }
    .btn-undo  { background: #26262a; color: #9090a0; }
    .btn-clear { background: #26262a; color: #9090a0; }
    .icon { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; flex-shrink: 0; }
    #canvas-wrap {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #232325;
    }
    #canvas-wrap canvas { display: block; }
    #picker-view { padding: 12px; display: none; flex-direction: column; gap: 8px; }
    .att-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      background: #18181a; border: 1px solid #2a2a2e;
      cursor: pointer; transition: border-color .12s;
    }
    .att-item:hover { border-color: #7b68ee; }
    .att-item img { width: 48px; height: 36px; object-fit: cover; border-radius: 4px; }
    .att-name { font-size: 12px; color: #909090; }
    #statusbar {
      padding: 3px 12px; font-size: 11px;
      color: #444458; background: #111113;
      border-top: 1px solid #2a2a2e; flex-shrink: 0;
    }
    #text-input-wrap { position: absolute; display: none; z-index: 100; }
    #text-input {
      background: rgba(17,17,19,.96); border: 1px solid #7b68ee;
      color: #e0e0e8; padding: 5px 10px; border-radius: 6px;
      font-size: 14px; outline: none; min-width: 160px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }
  </style>
</head>
<body>

<div id="topbar">
  <div id="topbar-left">
    <button class="tb-btn btn-undo" id="btn-undo">
      <svg class="icon" viewBox="0 0 16 16"><path d="M2.5 6.5h7a3.5 3.5 0 0 1 0 7H5"/><polyline points="2.5,3.5 2.5,6.5 5.5,6.5"/></svg>
      Zpět
    </button>
    <button class="tb-btn btn-clear" id="btn-clear">
      <svg class="icon" viewBox="0 0 16 16"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
      Smazat
    </button>
  </div>

  <div id="topbar-center">—</div>

  <div id="topbar-right">
    <button class="tb-btn btn-save" id="btn-save">
      <svg class="icon" viewBox="0 0 16 16"><path d="M13 11v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2"/><line x1="8" y1="2" x2="8" y2="10"/><polyline points="5,7 8,10 11,7"/></svg>
      Uložit
    </button>
  </div>
</div>

<div id="toolbar">
  <button class="tool-btn active" data-tool="select" title="Výběr">
    <svg class="icon" viewBox="0 0 16 16"><path d="M3 2l10 5.5-5.5 1.2L6 14z"/></svg>
  </button>
  <button class="tool-btn" data-tool="pencil" title="Volná kresba">
    <svg class="icon" viewBox="0 0 16 16"><path d="M11.5 2.5l2 2L5 13H3v-2z"/><path d="M9.5 4.5l2 2"/></svg>
  </button>
  <button class="tool-btn" data-tool="arrow" title="Šipka">
    <svg class="icon" viewBox="0 0 16 16"><line x1="3" y1="13" x2="13" y2="3"/><polyline points="7,3 13,3 13,9"/></svg>
  </button>
  <button class="tool-btn" data-tool="rect" title="Obdélník">
    <svg class="icon" viewBox="0 0 16 16"><rect x="2.5" y="4" width="11" height="8.5" rx="1.5"/></svg>
  </button>
  <button class="tool-btn" data-tool="text" title="Text">
    <svg class="icon" viewBox="0 0 16 16"><line x1="3" y1="4" x2="13" y2="4"/><line x1="8" y1="4" x2="8" y2="13"/><line x1="5" y1="13" x2="11" y2="13"/></svg>
  </button>

  <div class="sep"></div>

  <input type="color" id="color-pick" value="#7b68ee" title="Barva" />

  <div class="sep"></div>

  <input type="range" id="stroke-size" min="1" max="20" value="3" title="Tloušťka" />
  <span id="stroke-label">3</span>
</div>

<div id="canvas-wrap">
  <canvas id="ann-canvas"></canvas>
  <div id="text-input-wrap">
    <input id="text-input" type="text" placeholder="Zadejte text…" />
  </div>
</div>

<div id="picker-view"></div>
<div id="statusbar">Načítám…</div>

<script>
const t      = TrelloPowerUp.iframe({
  appKey:  'da588fc95ad8059bdbb7cb39ce62eada',
  appName: 'Image Annotator',
});
const params = new URLSearchParams(location.search);
const MODE   = params.get('mode') || 'viewer';

let canvas, activeTool = 'select';
let drawStart = null, tempShape = null;
let history = [];

const color     = () => document.getElementById('color-pick').value;
const lineWidth = () => parseInt(document.getElementById('stroke-size').value);

document.getElementById('stroke-size').addEventListener('input', function() {
  document.getElementById('stroke-label').textContent = this.value;
  if (canvas) {
    canvas.freeDrawingBrush.width = parseInt(this.value);
  }
});

async function init() {
  if (MODE === 'picker')  return initPicker();
  if (MODE === 'section') return initSection();
  if (MODE === 'auth')    return initAuth();
  await initViewer();
}

async function initPicker() {
  document.getElementById('topbar').style.display  = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('canvas-wrap').style.display = 'none';
  const wrap = document.getElementById('picker-view');
  wrap.style.display = 'flex';
  const card = await t.card('attachments', 'id');
  const atts = (card.attachments || []).filter(a =>
    a.mimeType?.startsWith('image/') || /\.(png|jpe?g|gif|webp)$/i.test(a.url)
  );
  if (!atts.length) {
    wrap.innerHTML = '<p style="padding:16px;color:#505060">Na kartě nejsou žádné obrázky.</p>';
    t.sizeTo('#picker-view'); return;
  }
  atts.forEach(a => {
    const el = document.createElement('div');
    el.className = 'att-item';
    el.innerHTML = `<img src="${a.previews?.[0]?.url || a.url}" alt=""><span class="att-name">${a.name}</span>`;
    el.onclick = () => t.modal({
      url:    t.signUrl(location.origin + `/viewer.html?mode=viewer&attId=${a.id}`),
      height: 640, title: a.name,
    });
    wrap.appendChild(el);
  });
  t.sizeTo('#picker-view');
}

async function initSection() {
  document.getElementById('topbar').style.display  = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('canvas-wrap').style.display = 'none';
  const card = await t.card('attachments', 'id');
  const count = (card.attachments || []).filter(a =>
    a.mimeType?.startsWith('image/') || /\.(png|jpe?g|gif|webp)$/i.test(a.url)
  ).length;
  const bar = document.getElementById('statusbar');
  bar.style.cssText = 'padding:10px;font-size:13px;color:#a0a0b0;border:none;background:#111113;';
  bar.textContent = count
    ? `${count} obrázk${count === 1 ? '' : 'y/u'} připraveno k anotaci`
    : 'Na kartě nejsou obrázky.';
  t.sizeTo('body');
}

async function initAuth() {
  document.getElementById('topbar').style.display  = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('canvas-wrap').style.display = 'none';
  const bar = document.getElementById('statusbar');
  bar.style.cssText = 'padding:12px;font-size:13px;color:#a0a0b0;border:none;';
  bar.textContent = 'Autorizace…';
  t.sizeTo('body');
}

async function initViewer() {
  setStatus('Načítám kartu…');
  let cardId, attachmentId, imageUrl, fileName;
  try {
    const attId = params.get('attId');
    const card  = await t.card('attachments', 'id');
    cardId = card.id;
    const att = attId
      ? card.attachments.find(a => a.id === attId)
      : card.attachments.find(a =>
          a.mimeType?.startsWith('image/') || /\.(png|jpe?g|gif|webp)$/i.test(a.url)
        );
    if (!att) { setStatus('Žádný obrázek nenalezen.'); return; }
    attachmentId = att.id;
    imageUrl     = att.url;
    fileName     = att.name;
  } catch (e) {
    setStatus('Chyba při načítání karty: ' + e.message); return;
  }

  document.getElementById('topbar-center').textContent = fileName || '—';

  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth  || 700;
  const H = wrap.clientHeight || 480;

  canvas = new fabric.Canvas('ann-canvas', {
    width: W, height: H, selection: true, isDrawingMode: false,
  });

  setStatus('Načítám obrázek…');
  try {
    const card2    = await t.card('attachments');
    const att2     = card2.attachments.find(a => a.id === attachmentId);
    const previews = att2?.previews || [];
    const biggest  = previews.length > 0 ? previews[previews.length - 1] : null;
    const loadUrl  = biggest ? biggest.url : imageUrl;

    const imgEl = new Image();
    imgEl.onload = () => {
      const fabricImg = new fabric.Image(imgEl);
      const scale = Math.min(W / fabricImg.width, H / fabricImg.height, 1);
      fabricImg.scale(scale);
      fabricImg.set({
        left: (W - fabricImg.width * scale) / 2,
        top:  (H - fabricImg.height * scale) / 2,
        selectable: false, evented: false,
      });
      canvas.add(fabricImg);
      canvas.sendToBack(fabricImg);
      setStatus('Připraveno');
      loadAnnotations(cardId, attachmentId);
    };
    imgEl.onerror = () => setStatus('Chyba načítání obrázku');
    imgEl.src = loadUrl;
  } catch(e) {
    setStatus('Chyba: ' + e.message);
  }

  setupTools(cardId, attachmentId);
}

function setupTools(cardId, attachmentId) {
  document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTool = btn.dataset.tool;
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      canvas.isDrawingMode = (activeTool === 'pencil');
      canvas.selection     = (activeTool === 'select');
    });
  });

  canvas.freeDrawingBrush.color = color();
  canvas.freeDrawingBrush.width = lineWidth();
  document.getElementById('color-pick').addEventListener('input', () => {
    canvas.freeDrawingBrush.color = color();
  });

  canvas.on('mouse:down', (opt) => {
    if (activeTool === 'select' || activeTool === 'pencil') return;
    const p = canvas.getPointer(opt.e);
    drawStart = { x: p.x, y: p.y };
    if (activeTool === 'text') { placeTextInput(p.x, p.y); return; }
    if (activeTool === 'arrow') {
      tempShape = new fabric.Line([p.x, p.y, p.x, p.y], {
        stroke: color(), strokeWidth: lineWidth(), selectable: false, evented: false,
      });
    } else if (activeTool === 'rect') {
      tempShape = new fabric.Rect({
        left: p.x, top: p.y, width: 0, height: 0,
        stroke: color(), strokeWidth: lineWidth(),
        fill: 'transparent', selectable: false, evented: false, rx: 2, ry: 2,
      });
    }
    if (tempShape) canvas.add(tempShape);
  });

  canvas.on('mouse:move', (opt) => {
    if (!tempShape || !drawStart) return;
    const p = canvas.getPointer(opt.e);
    if (activeTool === 'arrow') {
      tempShape.set({ x2: p.x, y2: p.y });
    } else if (activeTool === 'rect') {
      tempShape.set({
        left:   Math.min(drawStart.x, p.x),
        top:    Math.min(drawStart.y, p.y),
        width:  Math.abs(p.x - drawStart.x),
        height: Math.abs(p.y - drawStart.y),
      });
    }
    canvas.renderAll();
  });

  canvas.on('mouse:up', () => {
    if (!tempShape) return;
    if (activeTool === 'arrow') {
      const ln    = tempShape;
      const dx    = ln.x2 - ln.x1;
      const dy    = ln.y2 - ln.y1;
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      canvas.add(new fabric.Triangle({
        left: ln.x2, top: ln.y2, width: 12, height: 16,
        fill: color(), stroke: 'transparent',
        originX: 'center', originY: 'center',
        angle: angle + 90, selectable: false,
      }));
      ln.set({ selectable: true, evented: true });
    } else if (activeTool === 'rect') {
      tempShape.set({ selectable: true, evented: true });
    }
    pushHistory();
    tempShape = null; drawStart = null;
  });

  canvas.on('path:created', pushHistory);

  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-clear').addEventListener('click', () => {
    const bg = canvas.item(0);
    canvas.clear();
    if (bg) canvas.add(bg);
    history = [];
    setStatus('Canvas vyčištěn');
  });
  document.getElementById('btn-save').addEventListener('click', () =>
    saveAnnotations(cardId, attachmentId)
  );
}

function placeTextInput(x, y) {
  const wrap  = document.getElementById('text-input-wrap');
  const input = document.getElementById('text-input');
  wrap.style.display = 'block';
  wrap.style.left = (canvas._offset.left + x) + 'px';
  wrap.style.top  = (canvas._offset.top  + y) + 'px';
  input.value = '';
  input.focus();
  input.onkeydown = (e) => {
    if (e.key === 'Enter')  commitText(x, y);
    if (e.key === 'Escape') wrap.style.display = 'none';
  };
}

function commitText(x, y) {
  const wrap  = document.getElementById('text-input-wrap');
  const input = document.getElementById('text-input');
  if (!input.value.trim()) { wrap.style.display = 'none'; return; }
  canvas.add(new fabric.Text(input.value.trim(), {
    left: x, top: y, fontSize: 18, fill: color(),
    fontFamily: '-apple-system, sans-serif',
  }));
  pushHistory();
  wrap.style.display = 'none';
}

function pushHistory() { history.push(JSON.stringify(canvas)); }
function undo() {
  if (history.length < 2) return;
  history.pop();
  canvas.loadFromJSON(history[history.length - 1], () => canvas.renderAll());
}

async function loadAnnotations(cardId, attachmentId) {
  try {
    const res = await fetch(`/api/annotations?cardId=${cardId}&attachmentId=${attachmentId}`);
    if (!res.ok) return;
    const { data } = await res.json();
    if (data && Object.keys(data).length) {
      const bg = canvas.item(0);
      canvas.loadFromJSON(data, () => {
        if (bg) canvas.sendToBack(bg);
        canvas.renderAll();
        pushHistory();
        setStatus('Anotace načteny');
      });
    }
  } catch { setStatus('Nepodařilo se načíst anotace'); }
}

async function saveAnnotations(cardId, attachmentId) {
  setStatus('Ukládám…');
  const btn = document.getElementById('btn-save');
  try {
    const res = await fetch('/api/annotations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cardId, attachmentId,
        data: canvas.toJSON(['selectable', 'evented']),
      }),
    });
    if (res.ok) {
      setStatus('✓ Uloženo');
      btn.style.background = '#22c55e';
      setTimeout(() => { btn.style.background = '#7b68ee'; }, 1800);
    } else {
      setStatus('Chyba při ukládání: ' + res.status);
    }
  } catch (e) { setStatus('Chyba: ' + e.message); }
}

function setStatus(msg) { document.getElementById('statusbar').textContent = msg; }

init();
</script>
</body>
</html>
